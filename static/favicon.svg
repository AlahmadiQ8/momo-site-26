<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="clip"><rect width="32" height="32" rx="7"/></clipPath>
  </defs>
  <!-- Background -->
  <rect fill="#0d1117" width="32" height="32" rx="7"/>
  <g clip-path="url(#clip)">
    <!-- Kuwait flag stripe (right side) -->
    <rect fill="#007A3D" x="28.5" y="0" width="3.5" height="10.67"/>
    <rect fill="#FFFFFF" x="28.5" y="10.67" width="3.5" height="10.67"/>
    <rect fill="#CE1126" x="28.5" y="21.33" width="3.5" height="10.67"/>
  </g>
  <!-- Window dots -->
  <circle fill="#007A3D" cx="6.5" cy="5.5" r="1.2" opacity="0.6"/>
  <circle fill="#FFFFFF" cx="11" cy="5.5" r="1.2" opacity="0.4"/>
  <circle fill="#CE1126" cx="15.5" cy="5.5" r="1.2" opacity="0.6"/>
  <!-- Prompt chevron -->
  <path d="M7 13 L14 19 L7 25" stroke="#58a6ff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Cursor -->
  <line x1="17" y1="25" x2="25" y2="25" stroke="#58a6ff" stroke-width="2.6" stroke-linecap="round"/>
</svg>
