{{ define "main" }}
<section>
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  <div class="post-list">
    {{ range .Pages }}
    <article class="post-list-item">
      <h2 class="post-list-title">
        <a href="{{ .Permalink }}">{{ .Title }}</a>
      </h2>
      <div class="post-meta">
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
      </div>
    </article>
    {{ end }}
  </div>
</section>
{{ end }}
